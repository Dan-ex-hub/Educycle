{% extends 'hub/base.html' %}
{% block title %}EduCycle Assistant{% endblock %}

{% block content %}
<!--
  Full-viewport chat layout.
  The outer wrapper fills everything below the sticky navbar (64px = 4rem).
-->
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
<div id="chat-root"
  class="flex flex-col bg-white rounded-3xl border border-slate-200 shadow-card overflow-hidden"
  style="height: 680px;">

  <!-- ══════════════════════════════════════════
       TOP BAR
  ══════════════════════════════════════════ -->
  <div class="flex-shrink-0 flex items-center gap-3 px-4 py-3
              bg-gradient-to-r from-indigo-600 to-violet-600 z-10">
    <!-- Bot avatar -->
    <div class="relative flex-shrink-0">
      <div class="w-9 h-9 rounded-xl bg-white/20 backdrop-blur
                  flex items-center justify-center shadow-md">
        <i class="fas fa-robot text-white text-sm"></i>
      </div>
      <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-400
                   rounded-full border-2 border-indigo-600"></span>
    </div>
    <div class="flex-1 min-w-0">
      <p class="font-bold text-white text-sm leading-none">EduCycle Assistant</p>
      <p class="text-xs text-indigo-200 font-medium mt-0.5 flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
        Online · Replies instantly
      </p>
    </div>
    <!-- Clear chat -->
    <button id="clear-btn" title="Clear conversation"
      class="w-8 h-8 rounded-xl bg-white/15 hover:bg-white/25
             text-white/70 hover:text-white flex items-center justify-center transition-colors flex-shrink-0">
      <i class="fas fa-trash-alt text-xs"></i>
    </button>
  </div>

  <!-- ══════════════════════════════════════════
       MESSAGES AREA  (scrollable, fills space)
  ══════════════════════════════════════════ -->
  <div id="chat-messages"
    class="flex-1 overflow-y-auto px-4 py-4 space-y-4"
    style="background: linear-gradient(180deg,#f5f7ff 0%,#eef1ff 100%);
           scroll-behavior: smooth;">
  </div>

  <!-- ══════════════════════════════════════════
       QUICK PILLS
  ══════════════════════════════════════════ -->
  <div id="pills-bar"
    class="flex-shrink-0 px-4 py-2 bg-white border-t border-slate-100
           overflow-x-auto whitespace-nowrap scrollbar-hide">
    <div class="flex gap-2 items-center">
      <span class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider
                   flex-shrink-0 mr-1">Quick:</span>
      {% for q in suggested_questions %}
      <button onclick="sendPill('{{ q|escapejs }}')"
        class="pill-btn flex-shrink-0 px-3 py-1.5 bg-indigo-50 hover:bg-indigo-600
               hover:text-white text-indigo-700 text-xs font-semibold rounded-xl
               border border-indigo-100 hover:border-indigo-600 transition-all duration-150">
        {{ q }}
      </button>
      {% endfor %}
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       INPUT BAR
  ══════════════════════════════════════════ -->
  <div class="flex-shrink-0 px-4 py-3 bg-white border-t border-slate-200">
    <form id="chat-form" class="flex items-center gap-2">
      {% csrf_token %}
      <input type="text" id="message-input"
        placeholder="Ask me anything…"
        autocomplete="off"
        class="flex-1 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-2xl
               text-sm text-slate-800 placeholder-slate-400
               focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100
               transition-all">
      <button type="submit" id="send-btn"
        class="w-10 h-10 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50
               text-white rounded-2xl flex items-center justify-center shadow-sm
               transition-all hover:shadow-md flex-shrink-0">
        <i class="fas fa-paper-plane text-xs" id="send-icon"></i>
      </button>
    </form>
  </div>
</div><!-- end chat-root -->
</div><!-- end max-w wrapper -->

<!-- ══════════════════════════════════════════════════════════
     STYLES
══════════════════════════════════════════════════════════ -->
<style>
  /* Hide default page padding added by base.html's <main> */
  main { padding: 0 !important; }

  /* Bubbles */
  .bubble-user {
    background: linear-gradient(135deg,#4f46e5,#6366f1);
    color: #fff;
    border-radius: 1.25rem 1.25rem 0.25rem 1.25rem;
    padding: .7rem 1rem;
    max-width: 72%;
    font-size: .875rem;
    line-height: 1.55;
    box-shadow: 0 4px 14px rgba(99,102,241,.28);
    word-break: break-word;
  }
  .bubble-bot {
    background: #fff;
    color: #1e293b;
    border-radius: 1.25rem 1.25rem 1.25rem 0.25rem;
    padding: .7rem 1rem;
    max-width: 72%;
    font-size: .875rem;
    line-height: 1.55;
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    word-break: break-word;
  }
  .msg-meta {
    font-size: .65rem;
    opacity: .5;
    margin-top: 3px;
  }

  /* Typing indicator */
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #94a3b8;
    animation: tdot 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2){ animation-delay:.2s }
  .typing-dot:nth-child(3){ animation-delay:.4s }
  @keyframes tdot {
    0%,60%,100%{ transform:translateY(0); opacity:.45 }
    30%{ transform:translateY(-6px); opacity:1 }
  }

  /* Cursor blink during typewriter */
  .tw-cursor::after {
    content: '|';
    animation: blink .6s step-end infinite;
    color: #6366f1;
    font-weight: 300;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Escalation card */
  .escalate-card {
    background: linear-gradient(135deg,#eef2ff,#f5f3ff);
    border: 1.5px solid #c7d2fe;
    border-radius: 1rem;
    padding: .875rem 1rem;
    max-width: 72%;
    font-size: .8rem;
    line-height: 1.5;
    box-shadow: 0 2px 10px rgba(99,102,241,.1);
  }

  /* Scrollbar hide for pills */
  .scrollbar-hide::-webkit-scrollbar{ display:none }
  .scrollbar-hide{ -ms-overflow-style:none; scrollbar-width:none }
</style>

<!-- ══════════════════════════════════════════════════════════
     SCRIPT
══════════════════════════════════════════════════════════ -->
<script>
(function () {
  /* ── Config ── */
  const TYPEWRITER_SPEED = 18;   // ms per character
  const TYPING_DELAY     = 700;  // ms before bot "starts typing"

  const WELCOME = `{{ welcome_message|escapejs }}`;
  const SUGGESTED = [
    {% for q in suggested_questions %}"{{ q|escapejs }}",{% endfor %}
  ];

  let sessionId = '{{ request.session.session_key|default:"" }}' || 'sess_' + Date.now();
  let busy = false;

  /* ── Helpers ── */
  const box   = () => document.getElementById('chat-messages');
  const input = () => document.getElementById('message-input');
  const now   = () => new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  function scrollBottom() {
    const b = box();
    b.scrollTop = b.scrollHeight;
  }

  /* ── Bot avatar HTML ── */
  function botAvatar() {
    return `<div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-600 to-violet-600
                        flex items-center justify-center flex-shrink-0 shadow-sm self-end">
              <i class="fas fa-robot text-white text-xs"></i>
            </div>`;
  }

  /* ── Append user message ── */
  function appendUser(text) {
    const wrap = document.createElement('div');
    wrap.className = 'flex justify-end items-end gap-2 animate-fade-up';
    wrap.innerHTML = `
      <div>
        <div class="bubble-user">${escHtml(text)}</div>
        <p class="msg-meta text-right text-slate-400">${now()}</p>
      </div>`;
    box().appendChild(wrap);
    scrollBottom();
  }

  /* ── Show typing indicator ── */
  function showTyping() {
    const wrap = document.createElement('div');
    wrap.id = 'typing-ind';
    wrap.className = 'flex justify-start items-end gap-2';
    wrap.innerHTML = `
      ${botAvatar()}
      <div class="bubble-bot flex items-center gap-1.5 py-3 px-4">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>`;
    box().appendChild(wrap);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-ind');
    if (el) el.remove();
  }

  /* ── Typewriter effect ── */
  function typewrite(el, text, onDone) {
    el.classList.add('tw-cursor');
    let i = 0;
    const tick = () => {
      if (i < text.length) {
        // Handle newlines
        if (text[i] === '\n') {
          el.innerHTML += '<br>';
        } else {
          el.innerHTML += escHtml(text[i]);
        }
        i++;
        scrollBottom();
        setTimeout(tick, TYPEWRITER_SPEED);
      } else {
        el.classList.remove('tw-cursor');
        if (onDone) onDone();
      }
    };
    tick();
  }

  /* ── Append bot message with typewriter ── */
  function appendBot(text, onDone) {
    const wrap = document.createElement('div');
    wrap.className = 'flex justify-start items-end gap-2 animate-fade-up';
    const bubble = document.createElement('div');
    bubble.className = 'bubble-bot';
    const meta = document.createElement('p');
    meta.className = 'msg-meta text-slate-400';
    meta.textContent = now();

    const inner = document.createElement('div');
    bubble.appendChild(inner);

    wrap.innerHTML = '';
    wrap.insertAdjacentHTML('beforeend', botAvatar());
    const right = document.createElement('div');
    right.appendChild(bubble);
    right.appendChild(meta);
    wrap.appendChild(right);
    box().appendChild(wrap);
    scrollBottom();

    typewrite(inner, text, onDone);
  }

  /* ── Escalation card ── */
  function appendEscalate() {
    const wrap = document.createElement('div');
    wrap.className = 'flex justify-start items-end gap-2 animate-fade-up';
    wrap.innerHTML = `
      ${botAvatar()}
      <div>
        <div class="escalate-card">
          <div class="flex items-center gap-2 mb-2">
            <div class="w-7 h-7 rounded-lg bg-indigo-100 flex items-center justify-center flex-shrink-0">
              <i class="fas fa-headset text-indigo-600 text-xs"></i>
            </div>
            <p class="font-bold text-indigo-800 text-sm">Connect with our team</p>
          </div>
          <p class="text-slate-600 text-xs leading-relaxed mb-3">
            Our support team can help you with anything I can't handle.
            They typically respond within a few hours.
          </p>
          <div class="flex flex-wrap gap-2">
            <a href="/contact/"
              class="inline-flex items-center gap-1.5 px-3.5 py-2 bg-indigo-600 hover:bg-indigo-700
                     text-white text-xs font-bold rounded-xl transition-all hover:-translate-y-px shadow-sm">
              <i class="fas fa-envelope text-[10px]"></i>Message Admin
            </a>
            <a href="/help/"
              class="inline-flex items-center gap-1.5 px-3.5 py-2 bg-white hover:bg-slate-50
                     text-slate-700 text-xs font-semibold rounded-xl border border-slate-200 transition-all">
              <i class="fas fa-book-open text-[10px]"></i>Help Center
            </a>
          </div>
        </div>
        <p class="msg-meta text-slate-400">${now()}</p>
      </div>`;
    box().appendChild(wrap);
    scrollBottom();
  }

  /* ── Show pills after bot finishes ── */
  function showPills() {
    const bar = document.getElementById('pills-bar');
    if (bar) {
      bar.style.display = '';
      bar.style.opacity = '0';
      bar.style.transition = 'opacity .3s ease';
      requestAnimationFrame(() => { bar.style.opacity = '1'; });
    }
  }

  /* ── Send a message ── */
  function send(text) {
    if (busy || !text.trim()) return;
    busy = true;

    // Disable input
    input().disabled = true;
    document.getElementById('send-btn').disabled = true;

    // Hide pills while bot is thinking
    const bar = document.getElementById('pills-bar');
    if (bar) bar.style.opacity = '0.4';

    appendUser(text);

    setTimeout(() => {
      showTyping();

      fetch('/chatbot/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
        },
        body: `message=${encodeURIComponent(text)}&session_id=${encodeURIComponent(sessionId)}`
      })
      .then(r => r.json())
      .then(data => {
        hideTyping();
        const response = data.response || 'Sorry, something went wrong.';
        const escalate = data.escalate || false;

        appendBot(response, () => {
          if (escalate) {
            setTimeout(appendEscalate, 300);
          }
          showPills();
          busy = false;
          input().disabled = false;
          document.getElementById('send-btn').disabled = false;
          input().focus();
        });
      })
      .catch(() => {
        hideTyping();
        appendBot('Sorry, I ran into an error. Please try again.', () => {
          showPills();
          busy = false;
          input().disabled = false;
          document.getElementById('send-btn').disabled = false;
        });
      });
    }, TYPING_DELAY);
  }

  /* ── Pill click ── */
  window.sendPill = function(q) {
    input().value = '';
    send(q);
  };

  /* ── Form submit ── */
  document.getElementById('chat-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const msg = input().value.trim();
    input().value = '';
    send(msg);
  });

  /* ── Enter key ── */
  input().addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('chat-form').dispatchEvent(new Event('submit'));
    }
  });

  /* ── Clear chat ── */
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (busy) return;
    box().innerHTML = '';
    sessionId = 'sess_' + Date.now();
    // Re-show welcome
    setTimeout(() => appendBot(WELCOME, showPills), 200);
  });

  /* ── Escape HTML ── */
  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /* ── Init: welcome message ── */
  document.addEventListener('DOMContentLoaded', () => {
    // Try to load history first
    fetch(`/chatbot/history/${sessionId}/`)
      .then(r => r.json())
      .then(d => {
        if (d.messages && d.messages.length > 0) {
          d.messages.forEach(m => {
            if (m.type === 'user') appendUser(m.content);
            else {
              // Instant render for history (no typewriter)
              const wrap = document.createElement('div');
              wrap.className = 'flex justify-start items-end gap-2';
              wrap.innerHTML = `
                ${botAvatar()}
                <div>
                  <div class="bubble-bot">${m.content.replace(/\n/g,'<br>')}</div>
                  <p class="msg-meta text-slate-400">${m.timestamp}</p>
                </div>`;
              box().appendChild(wrap);
            }
          });
          scrollBottom();
          showPills();
        } else {
          // Fresh session — typewrite welcome
          appendBot(WELCOME, showPills);
        }
      })
      .catch(() => {
        appendBot(WELCOME, showPills);
      });
  });

})();
</script>
{% endblock %}
